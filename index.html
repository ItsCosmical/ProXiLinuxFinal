<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>GitHub VM - Debug Mode</title>
    <script src="libv86.js"></script>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: monospace; overflow: hidden; }
        #screen { height: 70vh; white-space: pre; border-bottom: 2px solid #333; }
        
        /* The Fake Console */
        #debug-console { 
            height: 30vh; background: #111; color: #0f0; 
            padding: 10px; overflow-y: auto; font-size: 12px;
        }
        .log-entry { margin-bottom: 4px; border-left: 3px solid #0f0; padding-left: 8px; }
        .error { color: #f00; border-color: #f00; }
    </style>
</head>
<body>

    <!-- Main VM Display -->
    <div id="screen"></div>

    <!-- Fake Debug Console -->
    <div id="debug-console">
        <div class="log-entry">--- Debugger Initialized ---</div>
    </div>

    <script>
        // Helper to print to our fake console
        function debugLog(msg, isError = false) {
            const consoleDiv = document.getElementById("debug-console");
            const entry = document.createElement("div");
            entry.className = isError ? "log-entry error" : "log-entry";
            entry.innerText = "[" + new Date().toLocaleTimeString() + "] " + msg;
            consoleDiv.appendChild(entry);
            consoleDiv.scrollTop = consoleDiv.scrollHeight; // Auto-scroll
        }

        window.onload = function() {
            debugLog("Starting VM Engine...");

            try {
                var emulator = new V86Starter({
                    wasm_path: "./v86.wasm",
                    memory_size: 256 * 1024 * 1024,
                    screen_container: document.getElementById("screen"),
                    bios: { url: "./bios/seabios.bin" },
                    vga_bios: { url: "./bios/vgabios.bin" },
                    cdrom: { url: "./TinyCore-current.iso" }, 
                    autostart: true,
                });

                debugLog("Loading TinyCore-current.iso...");

                // Monitor Download
                emulator.add_listener("download-progress", function(e) {
                    if (e.total) {
                        let pct = Math.round((e.loaded / e.total) * 100);
                        if (pct % 25 === 0) debugLog("ISO Download: " + pct + "%");
                    }
                });

                // Monitor Boot Start
                emulator.add_listener("emulator-started", function() {
                    debugLog("Engine started! Booting Linux...");
                });

                // Catch Errors
                window.onerror = function(msg) {
                    debugLog("SYSTEM ERROR: " + msg, true);
                };

            } catch (e) {
                debugLog("FATAL ERROR: " + e.message, true);
            }
        };
    </script>
</body>
</html>
