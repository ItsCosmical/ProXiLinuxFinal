<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>teeny proxi</title>
    <script src="libv86.js"></script>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: monospace; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        #loader { text-align: center; width: 300px; z-index: 10; }
        progress { width: 100%; height: 20px; margin-top: 10px; }
        #screen { white-space: pre; font-size: 14px; line-height: 14px; }
    </style>
</head>
<body>

    <div id="loader">
        <div id="status">Bypassing school filters...</div>
        <progress id="load-progress" value="0" max="100"></progress>
    </div>

    <div id="screen"></div>

    <script>
        window.onload = function() {
            var progressBar = document.getElementById("load-progress");
            var statusText = document.getElementById("status");
            var loaderDiv = document.getElementById("loader");

            var emulator = new V86Starter({
                wasm_path: "./v86.wasm",
                memory_size: 256 * 1024 * 1024, // 256MB is plenty for Tiny Core
                vga_memory_size: 8 * 1024 * 1024,
                screen_container: document.getElementById("screen"),
                bios: { url: "./bios/seabios.bin" },
                vga_bios: { url: "./bios/vgabios.bin" },
                
                // Ensure this filename matches EXACTLY what you uploaded
                cdrom: { url: "./TinyCore-current.iso" }, 
                
                autostart: true,
            });

            emulator.add_listener("download-progress", function(e) {
                if (e.total) {
                    var percent = (e.loaded / e.total) * 100;
                    progressBar.value = percent;
                    statusText.innerText = "Loading OS: " + Math.round(percent) + "%";
                }
            });

            emulator.add_listener("emulator-started", function() {
                loaderDiv.style.display = "none";
            });
        };
    </script>
</body>
</html>
