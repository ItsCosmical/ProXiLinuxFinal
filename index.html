<!-- Use the CDN links instead of local files -->
<script src="https://cdn.jsdelivr.net"></script>

<script>
    window.onload = function() {
        var emulator = new V86Starter({
            // Path to the WASM file on the CDN
            wasm_path: "https://cdn.jsdelivr.net",
            memory_size: 512 * 1024 * 1024,
            vga_memory_size: 8 * 1024 * 1024,
            screen_container: document.getElementById("screen"),
            
            // You still need these BIOS files in your repo's /bios/ folder
            bios: { url: "bios/seabios.bin" },
            vga_bios: { url: "bios/vgabios.bin" },
            
            cdrom: { url: "https://dl-cdn.alpinelinux.org/v3.23/releases/x86/alpine-virt-3.23.0-x86.iso" }, 
            autostart: true,
        });
    };
</script>
